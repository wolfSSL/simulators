name: Test suite

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  cargo-test:
    name: cargo test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # The se050-sim dev-dependency pulls the `se050` crate from ../nxp-se050.
      # That repo is gitignored locally and cloned fresh in CI — use the
      # sim-compat branch (same one the Dockerfiles pin to).
      - name: Fetch nxp-se050 driver (sim-compat)
        run: |
          git clone --branch sim-compat --depth 1 \
            https://github.com/LinuxJedi/nxp-se050.git SE050Sim/nxp-se050

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: SE050Sim/se050-sim

      - name: cargo test
        run: |
          cargo test --manifest-path SE050Sim/se050-sim/Cargo.toml \
            -- --test-threads=1
